services:
  app:
    build: .
    container_name: coffee-chain-analytics
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    # Supported env vars (full reference in .env.example). Each falls back to the
    # default below; override via the shell or a .env file.
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - AI_PROMPT_VERSION=${AI_PROMPT_VERSION:-v1}
    restart: unless-stopped
